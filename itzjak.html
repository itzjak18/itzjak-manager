  const msg = document.getElementById("sesMsg");

  if (!profId) { msg.innerHTML = '<span style="color:red">Selecciona el profesional</span>'; return; }
  if (!pacId) { msg.innerHTML = '<span style="color:red">Selecciona el paciente</span>'; return; }
  if (!tratamiento) { msg.innerHTML = '<span style="color:red">Selecciona el tipo de tratamiento</span>'; return; }
  if (!fecha) { msg.innerHTML = '<span style="color:red">Pon la fecha</span>'; return; }
  if (isNaN(honorario) || honorario < 0) { msg.innerHTML = '<span style="color:red">Honorario inválido</span>'; return; }
  if (isNaN(pagoPaciente) || pagoPaciente < 0) { msg.innerHTML = '<span style="color:red">Lo que paga el paciente es inválido</span>'; return; }
  if (pagoPaciente > honorario) { msg.innerHTML = '<span style="color:red">El paciente no puede pagar más que el honorario total</span>'; return; }

  const prof = PROFESIONALES.find(p => p.id === profId);
  const pac = PACIENTES.find(p => p.id === pacId);
  const itzjakCubre = honorario - pagoPaciente;

  // Si el paciente no tiene tratamiento con este profesional, crearlo automáticamente
  let trat = pac.tratamientos.find(t => t.profesional_id === profId && t.especialidad === tratamiento);
  if (!trat) {
    trat = {
      id: `t-${pacId}-${Date.now()}`,
      profesional_id: profId,
      profesional_nombre: prof.nombre,
      especialidad: tratamiento,
      tarifa_total: honorario,
      monto_paciente: pagoPaciente,
      monto_itzjak: itzjakCubre,
      sesiones_planificadas_mes: 4,
    };
    pac.tratamientos.push(trat);
    guardarPacientes();
  } else {
    // Actualizar montos del tratamiento si cambiaron
    trat.tarifa_total = honorario;
    trat.monto_paciente = pagoPaciente;
    trat.monto_itzjak = itzjakCubre;
    guardarPacientes();
  }

  const nuevaSesion = {
    id: nuevoId(SESIONES),
    fecha: new Date(fecha + 'T12:00:00'),
    paciente_id: pac.id,
    paciente_nombre: pac.nombre_completo,
    tratamiento_id: trat.id,
    profesional_id: prof.id,
    profesional_nombre: prof.nombre,
    tipo_servicio: tratamiento,
    tarifa_total: honorario,
    monto_paciente: pagoPaciente,
    monto_itzjak: itzjakCubre,
    asistio,
    estado_pago_itzjak: itzjakCubre > 0 ? "pendiente" : "no_aplica",
    fecha_pago: null,
    metodo_pago: null,
    cobro_paciente_recibido: pagoPaciente === 0 ? true : pagoRecibido,
    notas,
  };
  SESIONES.push(nuevaSesion);
  guardarSesiones();

  msg.innerHTML = `<span style="color:var(--verde)">✓ Sesión guardada. ${itzjakCubre > 0 ? `Itzjak debe ${ui.formatMoney(itzjakCubre)} a ${prof.nombre}.` : ''}</span>`;

  // Limpiar formulario
  document.getElementById("sesNotas").value = "";
  document.getElementById("sesPac").value = "";
  document.getElementById("sesProf").value = "";
  document.getElementById("sesTrat").value = "";
  document.getElementById("sesHonorario").value = "";
  document.getElementById("sesPagoPac").value = "";
  document.getElementById("sesPagoItz").value = "";

  setTimeout(() => msg.innerHTML = '', 5000);
}

function confirmarLiquidacion(profId) {
  const prof = PROFESIONALES.find(p => p.id === profId);
  const fecha = document.getElementById("liqFecha").value;
  const metodo = document.getElementById("liqMetodo").value;
  const referencia = document.getElementById("liqRef").value.trim();
  const notas = document.getElementById("liqNotas").value.trim();

  if (!fecha) { alert("Debes poner la fecha del pago"); return; }

  const idsAPagar = Array.from(document.querySelectorAll(".liq-check"))
    .filter(x => x.checked)
    .map(x => parseInt(x.dataset.id));

  if (idsAPagar.length === 0) { alert("Selecciona al menos una sesión"); return; }

  const fechaPago = new Date(fecha + 'T12:00:00');
  let total = 0;

  SESIONES.forEach(s => {
    if (idsAPagar.includes(s.id)) {
      s.estado_pago_itzjak = "pagado";
      s.fecha_pago = fechaPago;
      s.metodo_pago = metodo;
      s.referencia_pago = referencia;
      s.notas_pago = notas;
      total += s.monto_itzjak;
    }
  });

  // Actualizar último pago del profesional
  prof.ultimo_pago = fecha;

  guardarSesiones();
  guardarProfesionales();

  cerrarModal();
  alert(`✓ Pago confirmado: ${ui.formatMoney(total)} a ${prof.nombre} (${idsAPagar.length} sesiones)`);
  renderHonorarios();
}

  const inicioMesAnt = new Date(hoy.getFullYear(), hoy.getMonth() - 1, 1);
  const finMesAnt = new Date(hoy.getFullYear(), hoy.getMonth(), 0);

  const sesMA = SESIONES.filter(s => s.fecha >= inicioMesAnt && s.fecha <= finMesAnt);
  const pagadoMA = sesMA.filter(s => s.estado_pago_itzjak === "pagado").reduce((s,x) => s + x.monto_itzjak, 0);
  const pendMA = sesMA.filter(s => s.estado_pago_itzjak === "pendiente").reduce((s,x) => s + x.monto_itzjak, 0);
  const cobMA = sesMA.filter(s => s.cobro_paciente_recibido).reduce((s,x) => s + x.monto_paciente, 0);
  const donMA = DONACIONES.filter(d => d.fecha >= inicioMesAnt && d.fecha <= finMesAnt).reduce((s,d) => s + d.monto, 0);
  const balance = donMA - pagadoMA - pendMA;

  const sesMC = SESIONES.filter(s => s.fecha >= inicioMes);
  const pagadoMC = sesMC.filter(s => s.estado_pago_itzjak === "pagado").reduce((s,x) => s + x.monto_itzjak, 0);
  const pendMC = sesMC.filter(s => s.estado_pago_itzjak === "pendiente").reduce((s,x) => s + x.monto_itzjak, 0);
  const donMC = DONACIONES.filter(d => d.fecha >= inicioMes).reduce((s,d) => s + d.monto, 0);

  document.getElementById("view-cierre").innerHTML = `
    <div class="header-row">
      <h1>Cierre de mes</h1>
      <button class="btn-primary" onclick="window.print()">Imprimir resumen</button>
    </div>
    <p class="muted" style="margin-bottom:20px">Resumen financiero por mes: entradas, salidas y balance.</p>

    <h2 style="margin-top:8px">Mes en curso — ${ui.formatMesAnio(hoy)}</h2>
    <div class="kpi-grid" style="margin-bottom:32px">
      <div class="kpi-card green">
        <div class="kpi-header"><div class="kpi-label">Donaciones</div></div>
        <div class="kpi-value green">${ui.formatMoney(donMC)}</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-header"><div class="kpi-label">Pagado a profesionales</div></div>
        <div class="kpi-value red">${ui.formatMoney(pagadoMC)}</div>
      </div>
      <div class="kpi-card orange">
        <div class="kpi-header"><div class="kpi-label">Pendiente</div></div>
        <div class="kpi-value orange">${ui.formatMoney(pendMC)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-header"><div class="kpi-label">Sesiones</div></div>
        <div class="kpi-value">${sesMC.length}</div>
      </div>
    </div>

    <h2>Mes pasado — ${ui.formatMesAnio(inicioMesAnt)} (cerrado)</h2>
    <div class="kpi-grid">
      <div class="kpi-card green">
        <div class="kpi-header"><div class="kpi-label">Donaciones</div></div>
        <div class="kpi-value green">${ui.formatMoney(donMA)}</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-header"><div class="kpi-label">Pagado a profesionales</div></div>
        <div class="kpi-value red">${ui.formatMoney(pagadoMA + pendMA)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-header"><div class="kpi-label">Cobrado a pacientes</div></div>
        <div class="kpi-value">${ui.formatMoney(cobMA)}</div>
        <div class="kpi-foot">paga directo al profesional</div>
      </div>
      <div class="kpi-card ${balance >= 0 ? 'green' : 'red'}">
        <div class="kpi-header"><div class="kpi-label">Balance</div></div>
        <div class="kpi-value ${balance >= 0 ? 'green' : 'red'}">${ui.formatMoney(balance)}</div>
        <div class="kpi-foot">donaciones - honorarios</div>
      </div>
    </div>
  `;
}
